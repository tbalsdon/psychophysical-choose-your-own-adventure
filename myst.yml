version: 1
project:
  id: psychophysics-tutorials
  title: Psychophysics & Decision-Making
  subtitle: An explorable set of interactive tutorials
  authors:
    - name: Tarryn Balsdon
  # Interactive code is delivered via embedded JupyterLite notebooks (see
  # lite_files/ and the build step that outputs to _build/html/lite), not via
  # in-page execution — so no project.jupyter config is needed here.
  toc:
    - file: index.md
    - file: modules/sdt-intro.md
      children:
        - file: modules/sdt-threshold-theories.md
        - file: modules/sdt-criterion.md
          children:
            - file: modules/sdt-criterion-means.md
            - file: modules/sdt-criterion-baserate.md
        - file: modules/sdt-sensitivity.md
          children:
            - file: modules/sdt-sensitivity-accuracy.md
            - file: modules/sdt-sensitivity-norminv.md
            - file: modules/sdt-sensitivity-dprime.md
        - file: modules/sdt-forced-choice.md
          children:
            - file: modules/sdt-forced-choice-2afc.md
            - file: modules/sdt-forced-choice-threshold.md
        - file: modules/sdt-rating-response.md
        - file: modules/sdt-second-choice.md
        - file: modules/sdt-equal-variance.md
    - file: modules/noise.md
      children:
        - file: modules/noise-noisy-neurons.md
        - file: modules/noise-variance.md
    - file: modules/psy.md
      children:
        - file: modules/psy-decisions.md
          children:
            - file: modules/psy-detection-yesno.md
            - file: modules/psy-detection-2afc.md
            - file: modules/psy-discrimination.md
        - file: modules/psy-slope-threshold-bias.md
        - file: modules/psy-measuring.md
          children:
            - file: modules/psy-measuring-trials.md
            - file: modules/psy-measuring-fitting.md
        - file: modules/psy-extended.md
          children:
            - file: modules/psy-lapses.md
            - file: modules/psy-wobbly.md
            - file: modules/psy-scales-power.md
            - file: modules/psy-scales-variance.md
        - file: modules/psy-double-knob.md
    - file: sitemap.md
  exclude:
    - README.md
    - lite_files/**
site:
  template: book-theme
  options:
    logo_text: Psychophysics
    hide_outline: false
    folders: true
    style: custom.css
  nav:
    - title: Home
      url: /index
    - title: Module map
      url: /sitemap
